<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فوائد · Benefits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;500;700&family=Noto+Sans:wght@400;500&family=Noto+Sans+Bengali:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1209; --parchment:#f5eed8; --cream:#faf6ec;
  --gold:#b8860b; --gold-lt:#d4a843; --gold-pale:#f0e0a0;
  --green:#1b3a2e; --green-mid:#2d5c47; --green-lt:#4a8c6f;
  --rust:#8b3a1a; --border:rgba(184,134,11,.25); --shadow:rgba(26,18,9,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}

.page{display:none;position:relative;z-index:1;min-height:100vh}
.page.active{display:block}

#home{display:none;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center}
#home.active{display:flex}
.site-title{font-family:'Amiri',serif;font-size:clamp(3rem,9vw,5.5rem);font-weight:700;color:var(--green);line-height:1;margin-top:1.2rem}
.site-title-ar{font-family:'Noto Naskh Arabic',serif;font-size:clamp(2rem,6vw,4rem);color:var(--gold);display:block;margin-top:.3rem}
.divider{width:160px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:2rem auto}

.home-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;max-width:1000px;width:100%;margin-top:.5rem}
.home-card{background:var(--parchment);border:1px solid var(--border);border-radius:6px;padding:1.5rem;box-shadow:0 2px 12px var(--shadow);transition:transform 0.3s}
.home-card:hover{transform:translateY(-4px)}
.card-title{font-size:1.3rem;font-weight:600;color:var(--green)}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.3rem}

.btn-browse, .btn-add-card, .save-btn{font-family:'Cormorant Garamond',serif;padding:.4rem 1rem;cursor:pointer;border-radius:3px;transition:0.2s}
.btn-browse{background:none;border:1px solid var(--green);color:var(--green)}
.btn-add-card, .save-btn{background:var(--green);border:none;color:var(--gold-pale)}

.entry-link {
    display: block; background: var(--parchment); padding: 1.2rem; margin-bottom: 0.8rem;
    border: 1px solid var(--border); border-radius: 4px; text-decoration: none;
    color: var(--green); transition: 0.2s;
}
.entry-link:hover { border-color: var(--gold); transform: translateX(5px); }

#auth-overlay {
    display: none; position: fixed; inset: 0; background: rgba(26,18,9,0.85);
    z-index: 1000; align-items: center; justify-content: center;
}
#auth-overlay.open { display: flex; }
.auth-box { background: var(--parchment); padding: 2rem; border-radius: 4px; width: 320px; border: 1px solid var(--gold); }
.auth-box input { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid var(--border); }

.inner-page{max-width:920px;margin:0 auto;padding:2rem 1.5rem 5rem}
.page-header{padding:2.5rem 0 1.8rem;text-align:center;position:relative}
.back-btn{position:absolute;top:2.5rem;left:0;background:none;border:1px solid var(--border);padding:.4rem 1rem;cursor:pointer}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,18,9,.65);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--cream);padding:2.2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.76rem;text-transform:uppercase;margin-bottom:.3rem}
.field input, .field textarea, .field select{width:100%;background:var(--parchment);border:1px solid var(--border);padding:.55rem .85rem}

.benefit-card{background:var(--parchment);border:1px solid var(--border);border-radius:4px;position:relative;margin-top:1rem}
.card-main{padding:1.6rem 2rem 1.3rem}
.source-highlight { color: var(--gold); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; font-style: italic; display: block; border-left: 3px solid var(--gold); padding-left: 10px; }
.english-summary { font-size: 1rem; color: var(--ink); line-height: 1.6; margin-bottom: 1.5rem; }
.arabic-text{font-family:'Noto Naskh Arabic',serif;font-size:1.2rem;line-height:2;text-align:right;direction:rtl;margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem}
.trans-panel{border-top: 1px solid var(--border);}
.trans-header{display:flex;align-items:center;gap:.8rem;padding:.5rem 1rem;background:rgba(27,58,46,.05)}
.lang-tab{padding:.2rem .6rem;cursor:pointer;border:1px solid var(--border);font-size:.8rem;border-radius:15px}
.lang-tab.active{background:var(--green);color:white}
.lang-pane{display:none;padding:1rem}
.lang-pane.active{display:block}
.trans-text.rtl{direction:rtl;text-align:right;font-family:'Noto Naskh Arabic',serif}
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h3 style="margin-bottom:1rem; color:var(--green)">Contributor Login</h3>
        <input type="text" id="auth-user" placeholder="Username">
        <input type="password" id="auth-pass" placeholder="Password">
        <button class="save-btn" style="width:100%" onclick="login()">Login</button>
        <button class="btn-browse" style="width:100%; margin-top:0.5rem" onclick="closeAuth()">Cancel</button>
    </div>
</div>

<div id="home" class="page active">
  <h1 class="site-title">Benefits<span class="site-title-ar">فوائد</span></h1>
  <p style="font-style:italic; color:var(--green-mid)">A treasury of Islamic knowledge & verdicts</p>
  <div class="divider"></div>
  <div class="home-cards">
    <div class="home-card">
      <div class="card-title">Verdicts ⚖️</div>
      <div class="card-footer"><span id="cnt-verdicts">0</span> <button class="btn-browse" onclick="navigate('verdicts')">Browse</button></div>
    </div>
    <div class="home-card">
      <div class="card-title">Lecture Bits 📹</div>
      <div class="card-footer"><span id="cnt-audio">0</span> <button class="btn-browse" onclick="navigate('audio')">Browse</button></div>
    </div>
    <div class="home-card">
      <div class="card-title">Text Benefits 📜</div>
      <div class="card-footer"><span id="cnt-text">0</span> <button class="btn-browse" onclick="navigate('text')">Browse</button></div>
    </div>
    <div class="home-card" style="border: 1px solid var(--gold)">
      <div class="card-title">Browse by Language 🌍</div>
      <div class="card-footer"><span>Search</span> <button class="btn-browse" onclick="navigate('languages')">Enter</button></div>
    </div>
  </div>
</div>

<div id="inner-container" class="page">
    <div class="inner-page">
        <div class="page-header">
            <button class="back-btn" onclick="goHome()">← Home</button>
            <h2 id="inner-title" class="page-title"></h2>
        </div>
        <div id="list-view"></div>
        <div id="single-view" style="display:none"></div>
    </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
        <button style="position:absolute; top:1rem; right:1rem; cursor:pointer" onclick="closeModal()">✕</button>
        <h3 id="modal-title" style="margin-bottom:1.5rem"></h3>
        <div id="modal-body"></div>
    </div>
</div>

<script>
const ADMIN_PASS = "Nael2026";
let currentUser = null, pendingAction = null, curType = '', currentLangCode = '';
const load = () => JSON.parse(localStorage.getItem('ib_v3')) || {verdicts:[],audio:[],text:[]};
const save = (d) => localStorage.setItem('ib_v3', JSON.stringify(d));

const LANGS = [
  {code:'sw',name:'Swahili', native:'Kiswahili', rtl:false},
  {code:'ur',name:'Urdu', native:'اردو', rtl:true},
  {code:'ti',name:'Tigrinya', native:'ትግርኛ', rtl:false},
  {code:'ru',name:'Russian', native:'Русский', rtl:false},
  {code:'ms',name:'Malay', native:'Bahasa Melayu', rtl:false}
];

function login() {
    const user = document.getElementById('auth-user').value, pass = document.getElementById('auth-pass').value;
    if ((user === 'admin' && pass === ADMIN_PASS) || (pass === user + "1447")) {
        currentUser = user; document.getElementById('auth-overlay').classList.remove('open');
        if (pendingAction) pendingAction();
    } else alert("Incorrect credentials.");
}
function openAuthModal(user, action) { if(currentUser === 'admin' || currentUser === user) action(); else { pendingAction = action; document.getElementById('auth-overlay').classList.add('open'); } }
function closeAuth() { document.getElementById('auth-overlay').classList.remove('open'); }

function navigate(type) {
    curType = type;
    document.getElementById('home').classList.remove('active');
    document.getElementById('inner-container').classList.add('active');
    document.getElementById('inner-title').textContent = type === 'languages' ? 'Browse by Language' : (type === 'audio' ? 'Lecture Bits مقتطفات دروس' : type);
    type === 'languages' ? renderLangList() : renderList(type);
}

function goHome() {
    document.getElementById('inner-container').classList.remove('active');
    document.getElementById('home').classList.add('active');
    updateCounts();
}

function renderList(type) {
    const items = load()[type] || [];
    const listEl = document.getElementById('list-view');
    document.getElementById('single-view').style.display = 'none';
    listEl.style.display = 'block';
    listEl.innerHTML = `<button class="btn-add-card" style="margin-bottom:1rem" onclick="openAuthModal('admin', () => openModal('${type}'))">+ Add New</button>`;
    listEl.innerHTML += items.map(it => `<a href="#" class="entry-link" onclick="viewEntry('${type}','${it.id}')">${it.title}</a>`).join('');
}

function renderLangList() {
    const listEl = document.getElementById('list-view');
    document.getElementById('single-view').style.display = 'none';
    listEl.style.display = 'block';
    listEl.innerHTML = LANGS.map(l => `<a href="#" class="entry-link" onclick="viewByLanguage('${l.code}')">${l.native}</a>`).join('');
}

function viewByLanguage(langCode) {
    currentLangCode = langCode || currentLangCode;
    const d = load();
    const l = LANGS.find(lx => lx.code === currentLangCode);
    document.getElementById('inner-title').textContent = l ? l.native : 'Language';
    
    const results = [];
    ['verdicts','audio','text'].forEach(type => {
        d[type].forEach(it => { 
            // CRITICAL: Only show if a translation exists for this language
            if(it.translations[currentLangCode]) {
                let displayTitle = "";
                // Specific translation for the "Passing in front" verdict
                if(it.title === "Ruling on passing in front of someone while they are praying." && currentLangCode === 'ti') {
                    displayTitle = "ሕጊ ኣብ ቅድሚ ሓደ ሰብ ክሰግድ ከሎ ምሕላፍ";
                } else {
                    const rawText = it.translations[currentLangCode].text;
                    displayTitle = rawText.split('\n')[0].substring(0, 80) + (rawText.length > 80 ? '...' : '');
                }
                results.push({...it, category: type, displayTitle: displayTitle}); 
            }
        });
    });
    
    const listEl = document.getElementById('list-view');
    listEl.innerHTML = `<button onclick="renderLangList()" style="margin-bottom:1rem">← Back to Languages</button>`;
    if(!results.length) {
        listEl.innerHTML += `<p style='text-align:center; font-style:italic; margin-top:2rem'>No entries found in this language.</p>`;
    }
    
    listEl.innerHTML += results.map(it => `
        <a href="#" class="entry-link" onclick="viewEntry('${it.category}','${it.id}')">
            [${it.category.toUpperCase()}] ${it.displayTitle}
        </a>
    `).join('');
}

function viewEntry(type, id) {
    const it = load()[type].find(i => i.id === id);
    const view = document.getElementById('single-view');
    document.getElementById('list-view').style.display = 'none';
    view.style.display = 'block';
    const backFn = curType === 'languages' ? `viewByLanguage()` : `renderList('${curType}')`;
    view.innerHTML = `<button onclick="${backFn}" style="margin-bottom:1rem">← Back</button>` + buildCard(it, type);
}

function buildCard(it, type) {
    let embed = it.url ? `<iframe width="100%" height="315" src="${it.url.replace('watch?v=','embed/')}" frameborder="0" allowfullscreen style="margin-top:1rem"></iframe>` : '';
    let tabs = '', panes = '';
    Object.keys(it.translations).forEach((code, i) => {
        const tr = it.translations[code], l = LANGS.find(lx => lx.code === code) || {native:code};
        tabs += `<div class="lang-tab ${i===0?'active':''}" onclick="swTab('${it.id}','${code}', event)">${l.native}</div>`;
        panes += `<div class="lang-pane ${i===0?'active':''}" id="lp-${it.id}-${code}">
            <div class="trans-text ${l.rtl?'rtl':''}">${tr.text}</div>
            <button style="margin-top:1rem" onclick="openAuthModal('${l.name}', () => openTransModal('${type}','${it.id}','${code}'))">Edit Translation</button>
        </div>`;
    });
    return `
    <div class="benefit-card" id="card-${it.id}">
        <div class="card-main">
            <span class="source-highlight">— ${it.scholar || 'Source Unspecified'}</span>
            <div class="english-summary">${it.body || 'English summary unavailable.'}</div>
            <h4 style="margin-top:1rem">${it.title}</h4>
            ${it.arabic?`<div class="arabic-text">${it.arabic}</div>`:''}
            ${embed}
        </div>
        <div class="trans-panel">
            <div class="trans-header">
                <div class="lang-tabs">${tabs}</div>
                <button onclick="openAuthModal(null, () => openTransModal('${type}','${it.id}',null))">+ Add Translation</button>
            </div>
            ${panes || '<div style="padding:1rem">No translations yet.</div>'}
        </div>
    </div>`;
}

function swTab(itemId, code, ev) {
    const card = document.getElementById('card-'+itemId);
    card.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
    card.querySelectorAll('.lang-pane').forEach(p => p.classList.remove('active'));
    ev.target.classList.add('active');
    document.getElementById(`lp-${itemId}-${code}`).classList.add('active');
}

function openModal(type) {
    document.getElementById('modal-title').textContent = "Add " + (type === 'audio' ? 'Lecture Bit مقتطفات دروس' : type);
    document.getElementById('modal-body').innerHTML = `
        <div class="field"><label>Title</label><input type="text" id="f-title"></div>
        <div class="field"><label>Scholar / Source</label><input type="text" id="f-scholar"></div>
        <div class="field"><label>Arabic/Source Text</label><textarea id="f-arabic" dir="rtl"></textarea></div>
        ${type==='audio'?'<div class="field"><label>YouTube Link</label><input type="text" id="f-url"></div>':''}
        <div class="field"><label>English Summary</label><textarea id="f-body"></textarea></div>
        <button class="save-btn" onclick="saveItem('${type}')">Save Entry</button>`;
    document.getElementById('modal-overlay').classList.add('open');
}

function saveItem(type) {
    const d = load();
    const it = {id:Date.now().toString(36), title:document.getElementById('f-title').value, scholar:document.getElementById('f-scholar').value, body:document.getElementById('f-body').value, arabic:document.getElementById('f-arabic').value, url:document.getElementById('f-url')?.value||'', translations:{}};
    d[type].unshift(it); save(d); closeModal(); navigate(type);
}

function openTransModal(type, id, code) {
    const it = load()[type].find(i => i.id === id), ex = code ? it.translations[code] : null;
    document.getElementById('modal-body').innerHTML = `
        <div class="field"><label>Language</label>${code?code:`<select id="f-lang">${LANGS.map(l=>`<option value="${l.code}">${l.name}</option>`).join('')}</select>`}</div>
        <div class="field"><label>Translation</label><textarea id="f-ttext" style="height:150px">${ex?ex.text:''}</textarea></div>
        <button class="save-btn" onclick="saveTrans('${type}','${id}','${code}')">Save Translation</button>`;
    document.getElementById('modal-overlay').classList.add('open');
}

function saveTrans(type, id, code) {
    const d = load(), it = d[type].find(i => i.id === id);
    const finalCode = code || document.getElementById('f-lang').value;
    it.translations[finalCode] = {text: document.getElementById('f-ttext').value};
    save(d); closeModal(); viewEntry(type, id);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(ev) { if(ev.target.id==='modal-overlay') closeModal(); }
function updateCounts() { const d = load(); document.getElementById('cnt-verdicts').textContent = d.verdicts.length; document.getElementById('cnt-audio').textContent = d.audio.length; document.getElementById('cnt-text').textContent = d.text.length; }
updateCounts();
</script>
</body>
</html>
