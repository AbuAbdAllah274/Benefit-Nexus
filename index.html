<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فوائد · Benefits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;500;700&family=Noto+Sans:wght@400;500&family=Noto+Sans+Bengali:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ... [Keeping your existing CSS variables and base styles from before] ... */
:root {
--ink:#1a1209; --parchment:#f5eed8; --cream:#faf6ec;
--gold:#b8860b; --gold-lt:#d4a843; --gold-pale:#f0e0a0;
--green:#1b3a2e; --green-mid:#2d5c47; --green-lt:#4a8c6f;
--rust:#8b3a1a; --border:rgba(184,134,11,.25); --shadow:rgba(26,18,9,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--cream);color:var(--ink);min-height:100vh}

/* ... [Styles remain the same as previous working version] ... */
.page{display:none;position:relative;z-index:1;min-height:100vh}
.page.active{display:block}
#home.active{display:flex; flex-direction:column; align-items:center; padding:3rem;}
.home-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.8rem;width:100%;max-width:860px;}
.home-card{background:var(--parchment); padding:2rem; border-radius:6px; box-shadow:0 2px 12px var(--shadow);}
.btn-browse, .btn-add-card, .add-btn, .save-btn{cursor:pointer; border-radius:3px; transition:0.2s;}
.modal-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--cream); padding:2rem; width:400px; border-radius:4px;}
.field{margin-bottom:1rem;}
.field label{display:block; font-size:0.8rem; margin-bottom:0.3rem;}
.field input, .field textarea, .field select{width:100%; padding:0.5rem;}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="home" class="page active">
<h1>Benefits <span style="color:var(--gold)">فوائد</span></h1>
<div class="home-cards">
<!-- Verdicts Card -->
<div class="home-card">
<h3>Verdicts ⚖️</h3>
<p>Fatāwā and rulings.</p>
<button onclick="navigate('verdicts')">Browse</button>
<button onclick="checkAuth('admin', () => openModal('verdicts'))">+ Add</button>
</div>

<!-- Video Section (Replaces Audio) -->
<div class="home-card">
<h3>Video Lessons 📹</h3>
<p>Videos with transcriptions and translations.</p>
<button onclick="navigate('videos')">Browse</button>
<button onclick="checkAuth('admin', () => openModal('videos'))">+ Add</button>
</div>

<!-- Text Section -->
<div class="home-card">
<h3>Text Benefits 📜</h3>
<p>Written reminders and knowledge.</p>
<button onclick="navigate('text')">Browse</button>
<button onclick="checkAuth('admin', () => openModal('text'))">+ Add</button>
</div>
</div>
</div>

<!-- ══ VIDEO PAGE ══ -->
<div id="videos" class="page">
<button onclick="navigate('home')">← Back</button>
<h2>Video Lessons</h2>
<button onclick="checkAuth('admin', () => openModal('videos'))">+ Add Video</button>
<div id="videos-list"></div>
</div>

<!-- ══ LOGIN MODAL ══ -->
<div id="login-modal" class="modal-overlay">
<div class="modal">
<h3>Volunteer Checkpoint</h3>
<div class="field">
<label>Username (Language or 'admin')</label>
<input type="text" id="auth-user">
</div>
<div class="field">
<label>Password</label>
<input type="password" id="auth-pass">
</div>
<button class="save-btn" onclick="login()">Enter</button>
<button onclick="closeLogin()">Cancel</button>
</div>
</div>

<!-- [The rest of your existing Verdicts/Text pages and Modal UI remains here] -->

<script>
/* 🔑 AUTHENTICATION LOGIC */
const PASSWORDS = {
'admin': 'master123',
'Urdu': 'urdu786',
'Swahili': 'swahili456'
};

let currentUser = null;
let authCallback = null;

function checkAuth(requiredUser, callback) {
if (currentUser === 'admin' || currentUser === requiredUser) {
callback();
} else {
authCallback = callback;
document.getElementById('login-modal').classList.add('open');
}
}

function login() {
const user = document.getElementById('auth-user').value;
const pass = document.getElementById('auth-pass').value;

if (PASSWORDS[user] && PASSWORDS[user] === pass) {
currentUser = user;
alert("Logged in as " + user);
closeLogin();
if (authCallback) authCallback();
} else {
alert("Incorrect credentials.");
}
}

function closeLogin() {
document.getElementById('login-modal').classList.remove('open');
}

/* 📹 VIDEO MODAL SETUP */
function openModal(type) {
// If adding a main entry, only admin can do it
if (type === 'videos') {
document.getElementById('modal-body').innerHTML = `
<div class="field"><label>Video URL (YouTube)</label><input id="v-url"></div>
<div class="field"><label>Transcription (Arabic/Source)</label><textarea id="v-trans"></textarea></div>
<button onclick="saveVideo()">Save Video</button>
`;
}
// ... rest of modal logic
}

// Ensure you rename the storage keys from 'audio' to 'videos' in your load/save functions!
</script>
</body>
</html>
