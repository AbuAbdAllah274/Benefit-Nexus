<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فوائد · Benefits</title>
    <style>
        :root {
            --ink: #1a1209; --parchment: #f5eed8; --cream: #faf6ec;
            --gold: #b8860b; --gold-lt: #d4a843; --green: #1b3a2e;
            --green-mid: #2d5c47; --rust: #8b3a1a; --border: rgba(184,134,11,.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; background: var(--cream); color: var(--ink); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 800px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Typography */
        h1 { font-size: 3rem; color: var(--green); text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: var(--gold); display: block; font-size: 0.7em; }
        .divider { width: 100px; height: 2px; background: var(--gold); margin: 20px auto; opacity: 0.3; }

        /* Cards */
        .card { background: var(--parchment); border: 1px solid var(--border); padding: 20px; border-radius: 6px; margin-bottom: 15px; position: relative; }
        .entry-link { background: var(--parchment); padding: 15px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; cursor: pointer; color: var(--green); display: block; text-decoration: none; }
        
        /* Buttons */
        .btn { padding: 8px 16px; cursor: pointer; border-radius: 4px; font-family: inherit; transition: 0.2s; font-size: 0.9rem; }
        .btn-solid { background: var(--green); color: white; border: none; }
        .btn-outline { background: none; border: 1px solid var(--green); color: var(--green); }
        .btn-danger { color: var(--rust); border: 1px solid var(--rust); background: none; }

        /* Forms */
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--border); background: white; font-family: inherit; }
        label { font-size: 0.8rem; text-transform: uppercase; color: var(--green-mid); font-weight: bold; }

        /* Modals */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .overlay.active { display: flex; }
        .modal { background: var(--cream); padding: 25px; border-radius: 5px; width: 100%; max-width: 500px; }

        .arabic { font-size: 1.4rem; direction: rtl; text-align: right; line-height: 2; margin: 10px 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .english-box { background: rgba(184,134,11,0.05); padding: 15px; border-left: 3px solid var(--gold-lt); margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <!-- HOME PAGE -->
    <div id="page-home" class="page active">
        <h1>Benefits <span>فوائد</span></h1>
        <div class="divider"></div>
        <div id="counts" style="text-align: center; margin-bottom: 20px; color: var(--green-mid);"></div>
        
        <div class="card" onclick="showList('verdicts')"><h3>Verdicts</h3><p>Click to browse</p></div>
        <div class="card" onclick="showList('audio')"><h3>Lecture Bits</h3><p>Click to browse</p></div>
        <div class="card" onclick="showList('text')"><h3>Text Benefits</h3><p>Click to browse</p></div>
        <div class="card" onclick="showLanguages()" style="border: 1px solid var(--gold)"><h3>Browse by Language</h3></div>
    </div>

    <!-- LIST PAGE -->
    <div id="page-list" class="page">
        <button class="btn btn-outline" onclick="showHome()">← Home</button>
        <h2 id="list-title" style="margin: 20px 0; color: var(--green);"></h2>
        <button class="btn btn-solid" style="margin-bottom: 15px;" onclick="openAddEntryModal()">+ Add Main Entry (Admin)</button>
        <div id="list-content"></div>
    </div>

    <!-- ENTRY VIEW PAGE -->
    <div id="page-entry" class="page">
        <button class="btn btn-outline" onclick="window.history.back()">← Back</button>
        <div id="entry-content" style="margin-top:20px;"></div>
    </div>
</div>

<!-- MODALS -->
<div id="modal-auth" class="overlay">
    <div class="modal">
        <h3>Login Required</h3>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn btn-solid" onclick="attemptLogin()">Login</button>
        <button class="btn btn-outline" onclick="closeModals()">Cancel</button>
    </div>
</div>

<div id="modal-entry" class="overlay">
    <div class="modal">
        <h3 id="entry-modal-title">Add Entry</h3>
        <label>Title</label><input type="text" id="f-title">
        <label>Scholar</label><input type="text" id="f-scholar">
        <label>Arabic Text</label><textarea id="f-arabic" rows="3"></textarea>
        <label>English Translation</label><textarea id="f-english" rows="3"></textarea>
        <button class="btn btn-solid" onclick="saveEntry()">Save</button>
        <button class="btn btn-outline" onclick="closeModals()">Cancel</button>
    </div>
</div>

<div id="modal-trans" class="overlay">
    <div class="modal">
        <h3>Add/Edit Translation</h3>
        <label>Language</label>
        <select id="f-lang">
            <option value="ur">Urdu (اردو)</option>
            <option value="bn">Bengali (বাংলা)</option>
            <option value="sw">Swahili (Kiswahili)</option>
            <option value="ar">Arabic (العربية)</option>
            <option value="fr">French (Français)</option>
        </select>
        <label>Translation Text</label>
        <textarea id="f-trans-text" rows="5"></textarea>
        <button class="btn btn-solid" onclick="saveTranslation()">Save Translation</button>
        <button class="btn btn-outline" onclick="closeModals()">Cancel</button>
    </div>
</div>

<script>
    // Database Logic - Supports multiple versions to try and find your lost data
    let db = JSON.parse(localStorage.getItem('fawaid_v1')) || 
             JSON.parse(localStorage.getItem('ib_v4')) || 
             JSON.parse(localStorage.getItem('ib_v3')) || 
             { verdicts: [], audio: [], text: [] };

    let currentType = '';
    let currentEntryId = null;
    let currentUser = null;
    let pendingAction = null;

    function saveDB() {
        localStorage.setItem('fawaid_v1', JSON.stringify(db));
        updateCounts();
    }

    function updateCounts() {
        document.getElementById('counts').innerText = 
            `Verdicts: ${db.verdicts.length} | Bits: ${db.audio.length} | Text: ${db.text.length}`;
    }

    // Navigation
    function showHome() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-home').classList.add('active');
        updateCounts();
    }

    function showList(type) {
        currentType = type;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-list').classList.add('active');
        document.getElementById('list-title').innerText = type.toUpperCase();
        
        const content = document.getElementById('list-content');
        content.innerHTML = '';
        db[type].forEach(item => {
            const div = document.createElement('div');
            div.className = 'entry-link';
            div.innerText = item.title || 'Untitled';
            div.onclick = () => showEntry(item.id);
            content.appendChild(div);
        });
    }

    function showEntry(id) {
        currentEntryId = id;
        const item = db[currentType].find(i => i.id === id);
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const page = document.getElementById('page-entry');
        page.classList.add('active');

        let transHtml = '';
        for (let code in item.translations) {
            transHtml += `
                <div class="card" style="margin-top:10px">
                    <label>${code.toUpperCase()}</label>
                    <p>${item.translations[code].text}</p>
                    <button class="btn btn-outline" onclick="openTransModal('${code}')">Edit</button>
                </div>`;
        }

        document.getElementById('entry-content').innerHTML = `
            <div class="card">
                <button class="btn btn-danger" style="float:right" onclick="deleteEntry('${id}')">Delete (Admin)</button>
                <h2 style="color:var(--green)">${item.title}</h2>
                <p><strong>Scholar:</strong> ${item.scholar}</p>
                <div class="arabic">${item.arabic}</div>
                <div class="english-box">${item.english}</div>
                <button class="btn btn-solid" onclick="openTransModal()">+ Add Translation</button>
            </div>
            <h3>Translations</h3>
            ${transHtml}
        `;
    }

    // Auth
    function openAddEntryModal() {
        requireAuth('admin', () => {
            document.getElementById('entry-modal-title').innerText = "Add " + currentType;
            document.getElementById('modal-entry').classList.add('active');
        });
    }

    function deleteEntry(id) {
        requireAuth('admin', () => {
            if(confirm("Permanently delete?")) {
                db[currentType] = db[currentType].filter(i => i.id !== id);
                saveDB();
                showList(currentType);
            }
        });
    }

    function requireAuth(role, action) {
        if (currentUser === role || (role === 'any')) {
            action();
        } else {
            pendingAction = { role, action };
            document.getElementById('modal-auth').classList.add('active');
        }
    }

    function attemptLogin() {
        const u = document.getElementById('login-user').value.toLowerCase();
        const p = document.getElementById('login-pass').value;

        if (u === 'admin' && p === 'Nael2026') {
            currentUser = 'admin';
            document.getElementById('modal-auth').classList.remove('active');
            if (pendingAction) pendingAction.action();
        } else if (u && p === (u + "1447")) {
            currentUser = u;
            document.getElementById('modal-auth').classList.remove('active');
            if (pendingAction) pendingAction.action();
        } else {
            alert("Wrong credentials");
        }
    }

    // Modal Actions
    function saveEntry() {
        const newItem = {
            id: Date.now().toString(),
            title: document.getElementById('f-title').value,
            scholar: document.getElementById('f-scholar').value,
            arabic: document.getElementById('f-arabic').value,
            english: document.getElementById('f-english').value,
            translations: {}
        };
        db[currentType].push(newItem);
        saveDB();
        closeModals();
        showList(currentType);
    }

    function openTransModal(existingCode = null) {
        // Translations do not require a login unless editing an existing one? 
        // Based on your request: Only Admin needs password. Contributors use Language + 1447.
        // Let's set it so adding a translation asks for your Language login.
        requireAuth('any', () => {
            if (existingCode) {
                const item = db[currentType].find(i => i.id === currentEntryId);
                document.getElementById('f-lang').value = existingCode;
                document.getElementById('f-trans-text').value = item.translations[existingCode].text;
            } else {
                document.getElementById('f-trans-text').value = '';
            }
            document.getElementById('modal-trans').classList.add('active');
        });
    }

    function saveTranslation() {
        const code = document.getElementById('f-lang').value;
        const text = document.getElementById('f-trans-text').value;
        const item = db[currentType].find(i => i.id === currentEntryId);
        
        item.translations[code] = { text: text };
        saveDB();
        closeModals();
        showEntry(currentEntryId);
    }

    function closeModals() {
        document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
    }

    updateCounts();
</script>

</body>
</html>
