<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فوائد · Benefits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;500;700&family=Noto+Sans:wght@400;500&family=Noto+Sans+Bengali:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Existing Styles from previous version preserved */
:root {
--ink:#1a1209; --parchment:#f5eed8; --cream:#faf6ec;
--gold:#b8860b; --gold-lt:#d4a843; --gold-pale:#f0e0a0;
--green:#1b3a2e; --green-mid:#2d5c47; --green-lt:#4a8c6f;
--rust:#8b3a1a; --border:rgba(184,134,11,.25); --shadow:rgba(26,18,9,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--cream);color:var(--ink);min-height:100vh}

/* Authentication Modal Styling */
.auth-overlay {
display: none; position: fixed; inset: 0; background: rgba(26,18,9,0.85);
z-index: 1000; align-items: center; justify-content: center;
}
.auth-overlay.open { display: flex; }
.auth-box {
background: var(--parchment); padding: 2rem; border-radius: 4px;
width: 100%; max-width: 350px; text-align: center; border: 1px solid var(--gold);
}
.auth-box input {
width: 100%; padding: 0.8rem; margin: 0.5rem 0;
border: 1px solid var(--border); background: var(--cream);
}
/* ... rest of your existing CSS ... */
</style>
</head>
<body>

<div id="home" class="page active">
<h1 class="site-title">Benefits<span class="site-title-ar">فوائد</span></h1>
<div class="home-cards">
<!-- Verdicts -->
<div class="home-card">
<span class="card-icon">⚖️</span>
<div class="card-title">Verdicts <span class="card-title-ar">فتاوى</span></div>
<div class="card-footer">
<button class="btn-browse" onclick="navigate('verdicts')">Browse</button>
<button class="btn-add-card" onclick="requireAuth('admin', () => openModal('verdicts'))">+ Add</button>
</div>
</div>

<!-- Video Lessons (Replacing Audio) -->
<div class="home-card">
<span class="card-icon">📺</span>
<div class="card-title">Video Lessons <span class="card-title-ar">دروس مرئية</span></div>
<p class="card-desc">Videos with transcriptions and multilingual translations.</p>
<div class="card-footer">
<button class="btn-browse" onclick="navigate('videos')">Browse</button>
<button class="btn-add-card" onclick="requireAuth('admin', () => openModal('videos'))">+ Add</button>
</div>
</div>

<!-- Text -->
<div class="home-card">
<span class="card-icon">📜</span>
<div class="card-title">Text Benefits <span class="card-title-ar">فوائد نصية</span></div>
<div class="card-footer">
<button class="btn-browse" onclick="navigate('text')">Browse</button>
<button class="btn-add-card" onclick="requireAuth('admin', () => openModal('text'))">+ Add</button>
</div>
</div>
</div>
</div>

<!-- Login Overlay -->
<div class="auth-overlay" id="auth-overlay">
<div class="auth-box">
<h3>Volunteer Login</h3>
<input type="text" id="auth-user" placeholder="Username (e.g. Urdu)">
<input type="password" id="auth-pass" placeholder="Password">
<button class="save-btn" onclick="attemptLogin()">Login</button>
<button class="btn-browse" onclick="closeAuth()">Cancel</button>
</div>
</div>

<script>
/* 🔑 VOLUNTEER AUTHENTICATION */
const PASSWORDS = {
'admin': 'Nael2026', // Webmaster Password
'Urdu': 'UrduVol786',
'Swahili': 'SwahiliVol123',
'Bengali': 'BengaliVol456'
};

let sessionUser = null;
let pendingAction = null;

function requireAuth(role, action) {
if (sessionUser === 'admin' || sessionUser === role) {
action();
} else {
pendingAction = action;
document.getElementById('auth-overlay').classList.add('open');
}
}

function attemptLogin() {
const user = document.getElementById('auth-user').value;
const pass = document.getElementById('auth-pass').value;

if (PASSWORDS[user] && PASSWORDS[user] === pass) {
sessionUser = user;
document.getElementById('auth-overlay').classList.remove('open');
if (pendingAction) pendingAction();
alert(`Logged in as ${user}`);
} else {
alert("Invalid Username or Password");
}
}

function closeAuth() {
document.getElementById('auth-overlay').classList.remove('open');
pendingAction = null;
}

/* 📹 VIDEO MODAL LOGIC */
// Modified openModal to handle Video Transcriptions
function openModal(type) {
mType = type;
const title = type === 'videos' ? 'Add Video Lesson' : 'Add Benefit';
document.getElementById('modal-title').textContent = title;

let fields = `
<div class="field"><label>Title</label><input type="text" id="f-title"></div>
<div class="field"><label>YouTube URL</label><input type="text" id="f-url"></div>
<div class="field"><label>Transcription (Arabic/Source)</label><textarea id="f-arabic" dir="rtl"></textarea></div>
<div class="field"><label>Main English Summary</label><textarea id="f-body"></textarea></div>
`;

document.getElementById('modal-body').innerHTML = fields + `<button class="save-btn" onclick="saveItem()">Save</button>`;
document.getElementById('modal-overlay').classList.add('open');
}

// Ensure "Add Translation" buttons inside cards also use requireAuth(langCode, action)
</script>
</body>
</html>
