<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benefits · فوائد</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --ink:#1a1209; --parchment:#f5eed8; --gold:#b8860b; --green:#1b3a2e; }
body { font-family: serif; background: #faf6ec; color: var(--ink); margin: 0; }
.page { display: none; padding: 20px; }
.active { display: block; }
.arabic-source { font-family: 'Noto Naskh Arabic', serif; font-size: 1.4rem; direction: rtl; text-align: right; border-bottom: 2px solid var(--gold); padding: 15px; margin-bottom: 15px; }
.english-box { background: var(--parchment); padding: 15px; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid var(--green); }
.entry-link { display: block; background: white; padding: 15px; margin: 10px 0; border: 1px solid var(--gold); text-decoration: none; color: var(--green); border-radius: 4px; }
#auth-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
#auth-overlay.open { display: flex; }
.auth-box { background: white; padding: 25px; border-radius: 8px; width: 300px; text-align: center; }
</style>
</head>
<body>

<div id="auth-overlay">
<div class="auth-box">
<h3>Restricted Access</h3>
<input type="text" id="auth-user" placeholder="Username" style="width:90%; padding:8px; margin-bottom:10px;">
<input type="password" id="auth-pass" placeholder="Password" style="width:90%; padding:8px; margin-bottom:10px;">
<button onclick="login()" style="width:100%; padding:10px; background:var(--green); color:white; border:none;">Login</button>
<p onclick="document.getElementById('auth-overlay').classList.remove('open')" style="cursor:pointer; color:grey; margin-top:10px;">Cancel</p>
</div>
</div>

<div id="home" class="page active">
<h1 style="text-align:center;">Benefits <span style="color:var(--gold)">فوائد</span></h1>
<div style="display:flex; flex-direction:column; gap:10px;">
<button onclick="navigate('verdicts')" style="padding:15px;">Verdicts ⚖️</button>
<button onclick="navigate('audio')" style="padding:15px;">Lecture Bits مقتطفات دروس 📹</button>
<button onclick="navigate('languages')" style="padding:15px; border:2px solid var(--gold);">Browse by Language 🌍</button>
</div>
</div>

<div id="inner-container" class="page">
<button onclick="goHome()">← Back to Landing Page</button>
<h2 id="inner-title"></h2>
<div id="list-view"></div>
<div id="single-view" style="display:none"></div>
</div>

<script>
const ADMIN_PASS = "Nael2026";
let currentUser = null, pendingAction = null;

// THE SHARED PATH: Puter Cloud Key-Value Store
async function getCloudData() {
const data = await puter.kv.get('nael_benefits_v1');
return data ? JSON.parse(data) : { verdicts: [], audio: [], text: [] };
}

async function setCloudData(d) {
await puter.kv.set('nael_benefits_v1', JSON.stringify(d));
}

function login() {
const user = document.getElementById('auth-user').value.trim();
const pass = document.getElementById('auth-pass').value.trim();
if ((user === 'admin' && pass === ADMIN_PASS) || (pass === user + "1447")) {
currentUser = user;
document.getElementById('auth-overlay').classList.remove('open');
if (pendingAction) { pendingAction(); pendingAction = null; }
} else { alert("Unauthorized."); }
}

function checkAuth(role, action) {
if (currentUser === 'admin' || (role && currentUser === role)) action();
else { pendingAction = action; document.getElementById('auth-overlay').classList.add('open'); }
}

async function navigate(type) {
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.getElementById('inner-container').classList.add('active');
document.getElementById('inner-title').textContent = type;
type === 'languages' ? renderLangs() : renderList(type);
}

function goHome() {
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.getElementById('home').classList.add('active');
}

async function renderList(type) {
const d = await getCloudData();
const list = document.getElementById('list-view');
list.innerHTML = `<button onclick="checkAuth('admin', () => addEntry('${type}'))">+ Add New Entry</button>`;
d[type].forEach(it => {
list.innerHTML += `<a href="#" class="entry-link" onclick="viewItem('${type}','${it.id}')">${it.title}</a>`;
});
}

async function viewItem(type, id) {
const d = await getCloudData();
const it = d[type].find(i => i.id === id);
const view = document.getElementById('single-view');
document.getElementById('list-view').style.display = 'none';
view.style.display = 'block';

view.innerHTML = `
<div class="arabic-source">${it.arabic}</div>
<div class="english-box"><strong>English:</strong><br>${it.english}</div>
<button onclick="checkAuth(null, () => addTrans('${type}','${it.id}'))">+ Add Translation</button>
<div id="translations-list"></div>
`;

for(let lang in it.translations) {
view.innerHTML += `<div class="entry-link"><strong>${lang} (by ${it.translations[lang].name}):</strong><br>${it.translations[lang].text}</div>`;
}
}

async function addEntry(type) {
const title = prompt("Title (Internal Ref):");
const arabic = prompt("Source Text (Arabic):");
const english = prompt("Admin English Translation:");
if(title && arabic) {
const d = await getCloudData();
d[type].push({ id: Date.now().toString(), title, arabic, english, translations: {} });
await setCloudData(d);
navigate(type);
}
}

async function addTrans(type, id) {
const name = prompt("Contributor Name:");
const text = prompt("Translation Text (First line is the title):");
if(name && text) {
const d = await getCloudData();
const it = d[type].find(i => i.id === id);
it.translations[currentUser] = { name, text };
await setCloudData(d);
viewItem(type, id);
}
}
</script>
</body>
</html>
