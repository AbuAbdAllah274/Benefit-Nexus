<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benefits App</title>
    <style>
        body { font-family: sans-serif; background: #faf6ec; color: #1a1209; padding: 20px; }
        .card { background: #f5eed8; border: 1px solid #b8860b; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .btn { background: #1b3a2e; color: white; padding: 10px; border: none; cursor: pointer; border-radius: 4px; }
        .hidden { display: none; }
        input, textarea { width: 100%; margin: 10px 0; padding: 8px; }
        #auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="auth-overlay" class="hidden">
        <div style="background: white; padding: 20px; border-radius: 8px;">
            <h3>Admin Login</h3>
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="login()">Login</button>
            <button onclick="toggleAuth(false)">Cancel</button>
        </div>
    </div>

    <div id="home">
        <h1>Benefits App</h1>
        <div class="card">
            <h3>Verdicts</h3>
            <button class="btn" onclick="showSection('verdicts')">Browse</button>
        </div>
        <div class="card">
            <h3>Audio</h3>
            <button class="btn" onclick="showSection('audio')">Browse</button>
        </div>
    </div>

    <div id="section" class="hidden">
        <button onclick="goHome()">Back Home</button>
        <h2 id="sec-title"></h2>
        <button class="btn" onclick="toggleAuth(true)">+ Add Entry</button>
        <div id="list"></div>
    </div>

    <script>
        let currentType = '';
        let isAdmin = false;

        function showSection(type) {
            currentType = type;
            document.getElementById('home').classList.add('hidden');
            document.getElementById('section').classList.remove('hidden');
            document.getElementById('sec-title').innerText = type.toUpperCase();
            render();
        }

        function goHome() {
            document.getElementById('home').classList.remove('hidden');
            document.getElementById('section').classList.add('hidden');
        }

        function toggleAuth(show) {
            if (isAdmin && show) { showAddForm(); return; }
            document.getElementById('auth-overlay').classList.toggle('hidden', !show);
        }

        function login() {
            if (document.getElementById('pass').value === 'Nael2026') {
                isAdmin = true;
                toggleAuth(false);
                showAddForm();
            } else {
                alert('Wrong password');
            }
        }

        function showAddForm() {
            const title = prompt("Enter Title:");
            if (!title) return;
            const data = JSON.parse(localStorage.getItem('my_data') || '{"verdicts":[],"audio":[]}');
            data[currentType].push({ title: title, id: Date.now() });
            localStorage.setItem('my_data', JSON.stringify(data));
            render();
        }

        function render() {
            const data = JSON.parse(localStorage.getItem('my_data') || '{"verdicts":[],"audio":[]}');
            const list = data[currentType];
            document.getElementById('list').innerHTML = list.map(item => `<div class="card">${item.title}</div>`).join('');
        }

        function goHome() {
            document.getElementById('home').classList.remove('hidden');
            document.getElementById('section').classList.add('hidden');
        }
    </script>
</body>
</html>
