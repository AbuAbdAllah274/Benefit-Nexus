<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فوائد · Benefits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1209; --parchment: #f5eed8; --cream: #faf6ec;
            --gold: #b8860b; --gold-lt: #d4a843; --gold-pale: #f0e0a0;
            --green: #1b3a2e; --green-mid: #2d5c47; --green-lt: #4a8c6f;
            --rust: #8b3a1a; --border: rgba(184,134,11,.25); --shadow: rgba(26,18,9,.15);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cormorant Garamond', Georgia, serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
        
        .page { display: none; padding: 2rem 1.5rem; min-height: 100vh; }
        .page.active { display: block; }
        #home.active { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .site-title { font-family: 'Amiri', serif; font-size: clamp(3rem, 9vw, 5.5rem); color: var(--green); line-height: 1.1; margin-top: 1rem; }
        .site-title-ar { font-family: 'Noto Naskh Arabic', serif; font-size: 0.6em; color: var(--gold); display: block; margin-top: 0.5rem; }
        
        .divider { width: 160px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 2rem auto; }

        .home-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1000px; margin-top: 1rem; }
        .home-card { background: var(--parchment); border: 1px solid var(--border); padding: 1.5rem; border-radius: 6px; box-shadow: 0 2px 12px var(--shadow); transition: 0.3s; text-align: left; }
        .home-card:hover { transform: translateY(-4px); }
        .card-title { font-size: 1.3rem; font-weight: 600; color: var(--green); margin-bottom: 1rem; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }

        .btn-browse, .save-btn, .back-btn, .edit-btn { cursor: pointer; padding: 0.4rem 1rem; font-family: inherit; border-radius: 4px; font-size: 1rem; transition: 0.2s; }
        .btn-browse { background: none; border: 1px solid var(--green); color: var(--green); }
        .btn-browse:hover { background: var(--green); color: white; }
        .save-btn { background: var(--green); color: var(--gold-pale); border: none; }
        
        .entry-link { background: var(--parchment); padding: 1.2rem; margin-bottom: 0.8rem; border: 1px solid var(--border); cursor: pointer; display: block; text-decoration: none; color: var(--green); position: relative; }
        .entry-link:hover { border-color: var(--gold); transform: translateX(5px); }

        #auth-overlay, .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,18,9,0.9); z-index: 1000; align-items: center; justify-content: center; }
        #auth-overlay.open, .modal-overlay.open { display: flex; }
        .auth-box, .modal { background: var(--parchment); padding: 2rem; border-radius: 4px; width: 320px; border: 1px solid var(--gold); }
        .modal { width: 95%; max-width: 600px; max-height: 90vh; overflow-y: auto; background: var(--cream); }

        .field { margin-bottom: 1.2rem; }
        .field label { display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; color: var(--green-mid); letter-spacing: 0.05em; }
        .field input, .field textarea, .field select { width: 100%; padding: 10px; background: var(--parchment); border: 1px solid var(--border); font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; }
        
        .arabic-text { font-family: 'Noto Naskh Arabic', serif; direction: rtl; text-align: right; font-size: 1.4rem; line-height: 2.2; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .benefit-card { background: var(--parchment); border: 1px solid var(--border); padding: 2rem; position: relative; border-radius: 4px; }
        .source-highlight { color: var(--gold); font-size: 1.1rem; font-weight: 700; font-style: italic; border-left: 3px solid var(--gold); padding-left: 10px; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h3 style="margin-bottom:1rem; font-family:'Amiri', serif;">Contributor Login</h3>
        <input type="text" id="auth-user" placeholder="Username">
        <input type="password" id="auth-pass" placeholder="Password" style="width:100%; margin-top:10px; padding:8px;">
        <button class="save-btn" style="width:100%; margin-top:1rem;" onclick="doLogin()">Login</button>
        <button class="btn-browse" style="width:100%; margin-top:0.5rem" onclick="cancelAuth()">Cancel</button>
    </div>
</div>

<div id="home" class="page active">
    <h1 class="site-title">Benefits <span class="site-title-ar">فوائد</span></h1>
    <p style="font-style:italic; color:var(--green-mid)">A treasury of Islamic knowledge & verdicts</p>
    <div class="divider"></div>
    <div class="home-cards">
        <div class="home-card">
            <div class="card-title">Verdicts</div>
            <div class="card-footer"><span id="cnt-verdicts">0</span><button class="btn-browse" onclick="navigate('verdicts')">Browse</button></div>
        </div>
        <div class="home-card">
            <div class="card-title">Lecture Bits</div>
            <div class="card-footer"><span id="cnt-audio">0</span><button class="btn-browse" onclick="navigate('audio')">Browse</button></div>
        </div>
        <div class="home-card">
            <div class="card-title">Text Benefits</div>
            <div class="card-footer"><span id="cnt-text">0</span><button class="btn-browse" onclick="navigate('text')">Browse</button></div>
        </div>
        <div class="home-card" style="border: 1px solid var(--gold)">
            <div class="card-title">Languages</div>
            <div class="card-footer"><span>Find</span><button class="btn-browse" onclick="navigate('languages')">Enter</button></div>
        </div>
    </div>
</div>

<div id="inner-container" class="page">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <h2 id="inner-title" style="margin: 2rem 0; font-family: 'Amiri', serif; font-size: 2rem; color: var(--green);"></h2>
    <div id="list-view"></div>
    <div id="single-view" style="display:none"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title" style="margin-bottom:1.5rem; font-family:'Amiri', serif; color:var(--green);"></h3>
        <div id="modal-body"></div>
        <button class="btn-browse" style="width:100%; margin-top:10px;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'Nael2026';
    const LANGS = [
        {code:'ar', name:'Arabic', native:'العربية'},
        {code:'en', name:'English', native:'English'},
        {code:'ur', name:'Urdu', native:'اردو'},
        {code:'sw', name:'Swahili', native:'Kiswahili'},
        {code:'bn', name:'Bengali', native:'বাংলা'}
    ];

    let currentUser = null;
    let pendingAction = null;
    let curType = '';

    function load() {
        return JSON.parse(localStorage.getItem('ib_v3')) || {verdicts:[], audio:[], text:[]};
    }
    function save(d) { localStorage.setItem('ib_v3', JSON.stringify(d)); }

    function navigate(type) {
        curType = type;
        document.getElementById('home').classList.remove('active');
        document.getElementById('inner-container').classList.add('active');
        const titles = {verdicts:'Verdicts أحكام', audio:'Lecture Bits مقتطفات', text:'Text Benefits فوائد', languages:'Browse by Language'};
        document.getElementById('inner-title').textContent = titles[type] || type;
        if(type === 'languages') renderLangList(); else renderList(type);
    }

    function goHome() {
        document.getElementById('inner-container').classList.remove('active');
        document.getElementById('home').classList.add('active');
        updateCounts();
    }

    function renderList(type) {
        const items = load()[type] || [];
        const listEl = document.getElementById('list-view');
        document.getElementById('single-view').style.display = 'none';
        listEl.style.display = 'block';

        let html = `<button class="save-btn" style="margin-bottom:1.5rem" onclick="requireAuth('admin', () => openEntryModal('${type}'))">+ Add New Entry</button>`;
        if(items.length === 0) html += "<div class='entry-link'>No entries found yet.</div>";
        else {
            items.forEach(it => {
                html += `<div class="entry-link" onclick="viewEntry('${type}','${it.id}')">${it.title}</div>`;
            });
        }
        listEl.innerHTML = html;
    }

    function renderLangList() {
        const listEl = document.getElementById('list-view');
        document.getElementById('single-view').style.display = 'none';
        listEl.style.display = 'block';
        let html = "<p style='margin-bottom:1rem; font-style:italic;'>Select a language to see available translations:</p>";
        LANGS.forEach(l => {
            html += `<div class="entry-link" onclick="viewByLanguage('${l.code}')">${l.native} <span style="font-size:0.8rem; color:var(--green-mid); margin-left:10px;">${l.name}</span></div>`;
        });
        listEl.innerHTML = html;
    }

    function viewByLanguage(langCode) {
        const d = load();
        const l = LANGS.find(x => x.code === langCode);
        document.getElementById('inner-title').textContent = l.name + " · " + l.native;
        const listEl = document.getElementById('list-view');
        
        let results = [];
        ['verdicts', 'audio', 'text'].forEach(type => {
            d[type].forEach(item => {
                if(item.langCode === langCode) results.push({...item, type});
            });
        });

        if(results.length === 0) {
            listEl.innerHTML = `<p>No entries found for ${l.name}.</p><button class="btn-browse" onclick="navigate('languages')" style="margin-top:1rem;">Back to Languages</button>`;
            return;
        }

        listEl.innerHTML = results.map(it => `
            <div class="entry-link" onclick="viewEntry('${it.type}','${it.id}')">
                <span style="font-size:0.7rem; text-transform:uppercase; color:var(--gold); display:block;">${it.type}</span>
                ${it.title}
            </div>
        `).join('') + `<button class="btn-browse" onclick="navigate('languages')" style="margin-top:1rem;">Back to Languages</button>`;
    }

    function viewEntry(type, id) {
        const it = load()[type].find(i => i.id === id);
        const view = document.getElementById('single-view');
        document.getElementById('list-view').style.display = 'none';
        view.style.display = 'block';
        
        view.innerHTML = `
            <div class="benefit-card">
                <span class="source-highlight">— ${it.scholar || 'Source Unspecified'}</span>
                <div class="arabic-text">${it.arabic || ''}</div>
                <div style="background:rgba(184,134,11,0.05); padding:1.5rem; border-left:3px solid var(--gold-lt); font-size:1.1rem; line-height:1.6;">${it.english || 'No translation provided.'}</div>
                <div style="margin-top:2rem; display:flex; gap:10px;">
                    <button class="edit-btn" style="border:1px solid var(--rust); color:var(--rust);" onclick="requireAuth('admin', () => delItem('${type}','${id}'))">Delete</button>
                    <button class="btn-browse" onclick="renderList('${type}')">Back to List</button>
                </div>
            </div>
        `;
    }

    function openEntryModal(type) {
        const label = type === 'audio' ? 'Lecture Bit' : type === 'verdicts' ? 'Verdict' : 'Benefit';
        document.getElementById('modal-title').textContent = "Add " + label;
        document.getElementById('modal-body').innerHTML = `
            <div class="field"><label>Title (Internal Reference)</label><input type="text" id="f-title"></div>
            <div class="field"><label>Scholar / Source</label><input type="text" id="f-scholar"></div>
            <div class="field"><label>Language</label>
                <select id="f-lang">
                    ${LANGS.map(l => `<option value="${l.code}">${l.name}</option>`).join('')}
                </select>
            </div>
            <div class="field"><label>Arabic Text</label><textarea id="f-arabic" rows="4" dir="rtl"></textarea></div>
            <div class="field"><label>English Translation</label><textarea id="f-english" rows="4"></textarea></div>
            <button class="save-btn" style="width:100%; margin-bottom:10px;" onclick="saveEntry('${type}')">Save Entry</button>
        `;
        document.getElementById('modal-overlay').classList.add('open');
    }

    function saveEntry(type) {
        const d = load();
        const newItem = {
            id: Date.now().toString(),
            title: document.getElementById('f-title').value || 'Untitled',
            scholar: document.getElementById('f-scholar').value,
            langCode: document.getElementById('f-lang').value,
            arabic: document.getElementById('f-arabic').value,
            english: document.getElementById('f-english').value
        };
        d[type].unshift(newItem);
        save(d);
        closeModal();
        renderList(type);
    }

    function delItem(type, id) {
        if(!confirm("Are you sure you want to delete this entry?")) return;
        const d = load();
        d[type] = d[type].filter(i => i.id !== id);
        save(d);
        renderList(type);
    }

    function requireAuth(role, action) {
        if (currentUser === ADMIN_USER) action();
        else {
            pendingAction = action;
            document.getElementById('auth-overlay').classList.add('open');
        }
    }

    function doLogin() {
        const u = document.getElementById('auth-user').value;
        const p = document.getElementById('auth-pass').value;
        if (u === ADMIN_USER && p === ADMIN_PASS) {
            currentUser = u;
            document.getElementById('auth-overlay').classList.remove('open');
            if(pendingAction) pendingAction();
        } else { alert("Incorrect credentials."); }
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
    function cancelAuth() { document.getElementById('auth-overlay').classList.remove('open'); }
    
    function updateCounts() {
        const d = load();
        document.getElementById('cnt-verdicts').textContent = d.verdicts.length;
        document.getElementById('cnt-audio').textContent = d.audio.length;
        document.getElementById('cnt-text').textContent = d.text.length;
    }

    updateCounts();
</script>
</body>
</html>
