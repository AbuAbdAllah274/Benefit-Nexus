<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فوائد · Benefits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1209; --parchment: #f5eed8; --cream: #faf6ec;
            --gold: #b8860b; --gold-lt: #d4a843; --gold-pale: #f0e0a0;
            --green: #1b3a2e; --green-mid: #2d5c47; --green-lt: #4a8c6f;
            --rust: #8b3a1a; --border: rgba(184,134,11,.25); --shadow: rgba(26,18,9,.15);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cormorant Garamond', Georgia, serif; background: var(--cream); color: var(--ink); min-height: 100vh; line-height: 1.6; }
        
        .page { display: none; padding: 2rem 1.5rem; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; }
        #home.active { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .site-title { font-family: 'Amiri', serif; font-size: clamp(3rem, 9vw, 5rem); color: var(--green); line-height: 1; margin-top: 1rem; }
        .site-title-ar { font-family: 'Noto Naskh Arabic', serif; font-size: 0.7em; color: var(--gold); display: block; margin-top: 0.5rem; }
        
        .divider { width: 160px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 2rem auto; }

        .home-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; width: 100%; margin-top: 1rem; }
        .home-card { background: var(--parchment); border: 1px solid var(--border); padding: 1.5rem; border-radius: 6px; box-shadow: 0 2px 12px var(--shadow); transition: 0.3s; text-align: left; }
        .home-card:hover { transform: translateY(-4px); }
        .card-count { color: var(--green-mid); font-size: 0.9rem; margin-top: 10px; display: block; }

        .btn { cursor: pointer; padding: 0.5rem 1.2rem; font-family: inherit; border-radius: 3px; font-size: 1rem; transition: 0.2s; display: inline-block; text-decoration: none; }
        .btn-outline { background: none; border: 1px solid var(--green); color: var(--green); }
        .btn-outline:hover { background: var(--green); color: white; }
        .btn-solid { background: var(--green); color: var(--gold-pale); border: none; }
        .btn-solid:hover { opacity: 0.9; }

        .entry-link { background: var(--parchment); padding: 1.1rem; margin-bottom: 0.8rem; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--green); transition: 0.2s; font-weight: 500; }
        .entry-link:hover { border-color: var(--gold); transform: translateX(5px); }

        /* Modals */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(26,18,9,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 10px; }
        .overlay.active { display: flex; }
        .modal { background: var(--cream); padding: 2rem; border-radius: 4px; width: 100%; max-width: 500px; border: 1px solid var(--gold); position: relative; max-height: 95vh; overflow-y: auto; }

        .field { margin-bottom: 1.2rem; }
        .field label { display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; color: var(--green-mid); letter-spacing: 0.05em; font-weight: bold; }
        .field input, .field textarea, .field select { width: 100%; padding: 10px; background: var(--parchment); border: 1px solid var(--border); font-family: inherit; font-size: 1rem; }
        
        .arabic-display { font-family: 'Noto Naskh Arabic', serif; direction: rtl; text-align: right; font-size: 1.4rem; line-height: 2.2; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .benefit-card { background: var(--parchment); border: 1px solid var(--border); padding: 1.5rem; border-radius: 4px; position: relative; }
        .source-tag { color: var(--gold); font-size: 1.1rem; font-weight: 700; font-style: italic; border-left: 3px solid var(--gold); padding-left: 10px; margin-bottom: 1rem; display: block; }
        .english-box { background: rgba(184,134,11,0.05); padding: 1rem; border-left: 2px solid var(--gold-lt); margin-bottom: 1rem; }
    </style>
</head>
<body>

<!-- Login Modal -->
<div id="auth-modal" class="overlay">
    <div class="modal">
        <h3 style="margin-bottom:1rem; font-family:'Amiri', serif;">Contributor Login</h3>
        <input type="text" id="auth-user" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="auth-pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px;">
        <button class="btn btn-solid" style="width:100%" onclick="handleLogin()">Login</button>
        <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeAuth()">Cancel</button>
    </div>
</div>

<!-- Entry Modal -->
<div id="entry-modal" class="overlay">
    <div class="modal">
        <h3 id="modal-title" style="margin-bottom:1rem; font-family:'Amiri', serif;">Add Entry</h3>
        <div class="field"><label>Title</label><input type="text" id="f-title"></div>
        <div class="field"><label>Scholar</label><input type="text" id="f-scholar"></div>
        <div class="field"><label>Arabic</label><textarea id="f-arabic" rows="4" dir="rtl"></textarea></div>
        <div class="field"><label>English</label><textarea id="f-english" rows="4"></textarea></div>
        <div id="url-field" class="field" style="display:none;"><label>YouTube URL</label><input type="text" id="f-url"></div>
        <button class="btn btn-solid" style="width:100%" onclick="saveEntry()">Save Entry</button>
    </div>
</div>

<!-- Home Page -->
<div id="home" class="page active">
    <h1 class="site-title">Benefits <span class="site-title-ar">فوائد</span></h1>
    <p style="color:var(--green-mid)">A treasury of Islamic knowledge & verdicts</p>
    <div class="divider"></div>
    <div class="home-cards">
        <div class="home-card">
            <h3 style="color:var(--green)">Verdicts</h3>
            <span class="card-count" id="count-verdicts">0 entries</span>
            <div style="margin-top:1rem;"><button class="btn btn-outline" onclick="navigate('verdicts')">Browse</button></div>
        </div>
        <div class="home-card">
            <h3 style="color:var(--green)">Lecture Bits</h3>
            <span class="card-count" id="count-audio">0 entries</span>
            <div style="margin-top:1rem;"><button class="btn btn-outline" onclick="navigate('audio')">Browse</button></div>
        </div>
        <div class="home-card">
            <h3 style="color:var(--green)">Text Benefits</h3>
            <span class="card-count" id="count-text">0 entries</span>
            <div style="margin-top:1rem;"><button class="btn btn-outline" onclick="navigate('text')">Browse</button></div>
        </div>
        <div class="home-card" style="border-color: var(--gold);">
            <h3 style="color:var(--green)">Languages</h3>
            <span class="card-count">Browse by Language</span>
            <div style="margin-top:1rem;"><button class="btn btn-outline" onclick="navigate('languages')">Enter</button></div>
        </div>
    </div>
</div>

<!-- List/View Page -->
<div id="inner" class="page">
    <button class="btn btn-outline" onclick="goHome()">← Home</button>
    <h2 id="view-title" style="margin: 1.5rem 0; font-family:'Amiri', serif; color:var(--green); font-size:2rem;"></h2>
    <div id="list-controls">
        <button class="btn btn-solid" style="margin-bottom:1.5rem" onclick="checkAuth('admin', openAddForm)">+ Add New Entry</button>
    </div>
    <div id="content-area"></div>
</div>

<script>
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "Nael2026";
    
    let db = JSON.parse(localStorage.getItem('ib_v4')) || { verdicts: [], audio: [], text: [] };
    let currentView = 'home';
    let currentType = '';
    let currentUser = null;
    let pendingAction = null;

    function save() { localStorage.setItem('ib_v4', JSON.stringify(db)); updateCounts(); }

    function navigate(type) {
        currentType = type;
        document.getElementById('home').classList.remove('active');
        document.getElementById('inner').classList.add('active');
        const titles = {verdicts: 'Verdicts أحكام', audio: 'Lecture Bits مقتطفات', text: 'Text Benefits فوائد', languages: 'Browse by Language'};
        document.getElementById('view-title').textContent = titles[type];
        
        if(type === 'languages') {
            renderLanguages();
        } else {
            renderList();
        }
    }

    function goHome() {
        document.getElementById('inner').classList.remove('active');
        document.getElementById('home').classList.add('active');
    }

    function renderList() {
        document.getElementById('list-controls').style.display = 'block';
        const area = document.getElementById('content-area');
        const items = db[currentType] || [];
        if(items.length === 0) {
            area.innerHTML = "<p style='font-style:italic; color:var(--green-mid)'>No entries yet.</p>";
        } else {
            area.innerHTML = items.map((it, idx) => `
                <div class="entry-link" onclick="viewEntry(${idx})">${it.title}</div>
            `).join('');
        }
    }

    function renderLanguages() {
        document.getElementById('list-controls').style.display = 'none';
        const area = document.getElementById('content-area');
        area.innerHTML = "<p>Feature coming in the next data update. Currently browsing by category is active.</p>";
    }

    function viewEntry(idx) {
        document.getElementById('list-controls').style.display = 'none';
        const it = db[currentType][idx];
        const area = document.getElementById('content-area');
        
        let embed = "";
        if(it.url) {
            const vidId = it.url.split('v=')[1] || it.url.split('/').pop();
            embed = `<iframe width="100%" height="315" src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen style="margin-top:1rem; border-radius:4px;"></iframe>`;
        }

        area.innerHTML = `
            <button class="btn btn-outline" style="margin-bottom:1rem" onclick="renderList()">← Back to List</button>
            <div class="benefit-card">
                <span class="source-tag">— ${it.scholar || 'Source Unspecified'}</span>
                <div class="arabic-display">${it.arabic || ''}</div>
                <div class="english-box">${it.english || 'No translation provided.'}</div>
                ${embed}
                <div style="margin-top:1.5rem">
                    <button class="btn btn-outline" style="color:var(--rust); border-color:var(--rust);" onclick="checkAuth('admin', () => deleteItem(${idx}))">Delete Entry</button>
                </div>
            </div>
        `;
    }

    function openAddForm() {
        document.getElementById('f-title').value = '';
        document.getElementById('f-scholar').value = '';
        document.getElementById('f-arabic').value = '';
        document.getElementById('f-english').value = '';
        document.getElementById('f-url').value = '';
        document.getElementById('url-field').style.display = currentType === 'audio' ? 'block' : 'none';
        document.getElementById('entry-modal').classList.add('active');
    }

    function saveEntry() {
        const title = document.getElementById('f-title').value;
        if(!title) return alert("Title required");
        
        db[currentType].unshift({
            title,
            scholar: document.getElementById('f-scholar').value,
            arabic: document.getElementById('f-arabic').value,
            english: document.getElementById('f-english').value,
            url: document.getElementById('f-url').value,
            id: Date.now()
        });
        save();
        document.getElementById('entry-modal').classList.remove('active');
        renderList();
    }

    function deleteItem(idx) {
        if(!confirm("Permanently delete?")) return;
        db[currentType].splice(idx, 1);
        save();
        renderList();
    }

    function checkAuth(role, action) {
        if(currentUser === ADMIN_USER) {
            action();
        } else {
            pendingAction = action;
            document.getElementById('auth-modal').classList.add('active');
        }
    }

    function handleLogin() {
        const u = document.getElementById('auth-user').value;
        const p = document.getElementById('auth-pass').value;
        if(u === ADMIN_USER && p === ADMIN_PASS) {
            currentUser = u;
            document.getElementById('auth-modal').classList.remove('active');
            if(pendingAction) pendingAction();
        } else {
            alert("Invalid credentials");
        }
    }

    function closeAuth() { document.getElementById('auth-modal').classList.remove('active'); }
    function closeModal() { document.getElementById('entry-modal').classList.remove('active'); }
    
    function updateCounts() {
        document.getElementById('count-verdicts').textContent = `${db.verdicts.length} entries`;
        document.getElementById('count-audio').textContent = `${db.audio.length} entries`;
        document.getElementById('count-text').textContent = `${db.text.length} entries`;
    }

    updateCounts();
</script>

</body>
</html>
